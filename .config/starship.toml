# Starship configuration schema URL for validation
"$schema" = 'https://starship.rs/config-schema.json'

# Main prompt format string. Default: varies by modules enabled.
format = """
[¯éÂ](color_orange)\
$os\
$username\
[¯é░](bg:color_yellow fg:color_orange)\
$directory\
[¯é░](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[¯é░](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[¯é░](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[¯é░](fg:color_bg3 bg:color_bg1)\
[¯é┤ ](fg:color_bg1)\
$line_break$character"""

# Palette name to use. Default: none (uses built-in colors).
palette = 'gruvbox_dark'

# Custom color palette definition. Default: none.
[palettes.gruvbox_dark]
color_fg0 = '#fbf1c7'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#458588'
color_aqua = '#689d6a'
color_green = '#98971a'
color_orange = '#d65d0e'
color_purple = '#b16286'
color_red = '#cc241d'
color_yellow = '#d79921'

# OS module: displays OS symbol. Default: disabled=false, style="bg:color_orange fg:color_fg0".
[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

# OS symbols for different systems. Default: various symbols as shown.
[os.symbols]
Windows = "¾░ì▓"
Ubuntu = "¾░òê"
SUSE = "´îö"
Raspbian = "¾░É┐"
Mint = "¾░ú¡"
Macos = "¾░ÇÁ"
Manjaro = "´îÆ"
Linux = "¾░î¢"
Gentoo = "¾░ú¿"
Fedora = "¾░úø"
Alpine = "´îÇ"
Amazon = "´ë░"
Android = "¯£Ä"
AOSC = "´îü"
