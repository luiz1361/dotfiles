# Username module: shows current user. Default: show_always=false, style_user="fg:color_green", style_root="fg:color_red", format="[$user]($style)".
[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

# Directory module: displays current directory. Default: style="fg:color_cyan", format="[$path]($style)", truncation_length=3, truncation_symbol="ÔÇª/".
[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "ÔÇª/"

# Directory substitutions for shortening paths. Default: none.
[directory.substitutions]
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "¾░ØÜ "
"Pictures" = "´Ç¥ "
"Developer" = "¾░▓ï "

# Git branch module: shows current branch. Default: symbol="¯éá", style="fg:color_purple", format="[$symbol $branch]($style)".
[git_branch]
symbol = "´Éÿ"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

# Git status module: shows repository status. Default: style="fg:color_green", format="[$all_status$ahead_behind]($style)".
[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

# Node.js module: displays Node.js version. Default: symbol="Ô¼ó", style="fg:color_green", format="[$symbol($version)]($style)".
[nodejs]
symbol = "¯£ÿ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# C module: displays C compiler version. Default: symbol="C", style="fg:color_green", format="[$symbol($version)]($style)".
[c]
symbol = "¯ÿ× "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# C++ module: displays C++ compiler version. Default: symbol="C++", style="fg:color_green", format="[$symbol($version)]($style)".
[cpp]
