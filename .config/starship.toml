# Python module: displays Python version. Default: symbol="­ƒÉì", style="fg:color_yellow", format="[$symbol($version)]($style)".
[python]
symbol = "¯ÿå"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

# Docker context module: shows Docker context. Default: symbol="­ƒÉ│", style="fg:color_blue", format="[$symbol $context]($style)".
[docker_context]
symbol = "´îê"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

# Conda module: displays Conda environment. Default: style="fg:color_green", format="[$symbol($environment)]($style)".
[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

# Pixi module: displays Pixi version and environment. Default: style="fg:color_yellow", format="[$symbol($version)($environment)]($style)".
[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

# Time module: shows current time. Default: disabled=true, time_format="%R", style="fg:color_fg0", format="[$time]($style)".
[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ ´É║ $time ](fg:color_fg0 bg:color_bg1)]($style)'

# Line break module: adds a line break. Default: disabled=false.
[line_break]
disabled = false

# Character module: displays prompt character. Default: disabled=false, success_symbol="ÔØ»", error_symbol="ÔØ»", etc.
[character]
disabled = false
success_symbol = '[´É▓](bold fg:color_green)'
error_symbol = '[´É▓](bold fg:color_red)'
vimcmd_symbol = '[´É┤](bold fg:color_green)'
vimcmd_replace_one_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_replace_symbol = '[´É┤](bold fg:color_purple)'
vimcmd_visual_symbol = '[´É┤](bold fg:color_yellow)'

